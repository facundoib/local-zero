name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'prototypes/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'prototypes/**'
      - 'docs/**'
      - '*.md'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Rust check
        working-directory: src-tauri
        run: cargo check
